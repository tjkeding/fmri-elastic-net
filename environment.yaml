name: fmri-elastic-net
channels:
  - conda-forge
  - defaults
# Versions pinned to minor release (=X.Y.*) to allow patch-level security updates
# while preserving API compatibility. Tested against 418/418 tests.
dependencies:
  - python=3.10
  - pip
  - numpy=2.2.*
  - pandas=2.3.*
  - scipy=1.15.*
  - scikit-learn=1.7.*
  - joblib=1.5.*
  - pyyaml=6.0.*
  - hdbscan=0.8.*
  - pytest-cov=7.0.*
